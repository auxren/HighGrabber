name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package
        run: python -m pip install -e .

      - name: Compile all modules
        run: python -m py_compile src/highgrabber/*.py

      - name: Import smoke test
        run: |
          python -c "import highgrabber.cli, highgrabber.api, highgrabber.auth, highgrabber.download, highgrabber.extract, highgrabber.parse"

      - name: CLI help
        run: |
          highgrabber --version
          highgrabber --help
          highgrabber download --help
          highgrabber login --help
          highgrabber logout --help
